# =============================================================================
# Pipeline 4: Release Pipeline (main branch, manual trigger)
# =============================================================================
# Manually triggered on main. Versions, builds, tests, packages, and publishes
# release artifacts to production CodeArtifact repos and S3. Includes git push
# and rollback capabilities.
# Stage order: pre_release -> release_publish -> post_release
# =============================================================================

# Build the base Docker image for release pipelines
release_base_image:
