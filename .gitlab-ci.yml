  tags:
    - arch:amd64
    - size:3xlarge
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
      - solution-manifest.yaml
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  needs:
    - prerelease_analyze
  dependencies: []
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/quality/git_secrets.sh
    - ./scripts/build/npm_install_repo.sh
    - ./scripts/publish/version_release.sh
