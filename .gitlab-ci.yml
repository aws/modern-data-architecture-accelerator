    - ./scripts/ci/check_schema_drift.sh
    - npm run test
    - ./scripts/build/package_repo.sh

# Manual confirmation gate to proceed with the release
release:
  interruptible: false
  tags:
    - arch:amd64
    - size:medium
  environment: release
  when: manual
  manual_confirmation: 'Are you sure you want to create a $VERSION_BUMP_LEVEL $RELEASE_TYPE version?'
  except:
    variables:
