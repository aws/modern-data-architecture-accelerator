  allow_failure: false
  needs:
    - prerelease_analyze
  dependencies: []
  variables:
    AWS_CREDS_TARGET_ROLE: "${DEV_ROLE_ARN}"
  script:
    - ./scripts/git_secrets.sh
    - ./scripts/npm_install.sh
    - ./scripts/version_release.sh
    - ./scripts/build_test.sh
    - ./scripts/package.sh

release:
  tags:
    - arch:amd64
    - size:small
  environment: release
  when: manual
  manual_confirmation: "Are you sure you want to create a $VERSION_BUMP_LEVEL $RELEASE_TYPE version?"
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  dependencies: []
  needs:
    - release_version_package
  allow_failure: false
  script:
    - echo "Releasing "

