# =============================================================================
# GitLab CI/CD Configuration
# =============================================================================
# Pipelines:
#   1. Feature Merge Pipeline  - Runs on merge requests (feature_merge_*)
#   2. Feature Branch Pipeline - Runs on feature branches when RUN_FEATURE_PIPELINE=true (feature_*)
#   3. Prerelease Pipeline     - Runs on main branch commits (prerelease_*)
#   4. Release Pipeline        - Manually triggered on main branch (release_*)
#   5. Cornerstone Pipeline    - Manually triggered on main for distribution builds (cornerstone_*)
# =============================================================================

workflow:
  auto_cancel:
    on_new_commit: conservative

stages:
  - base_image
  - prebuild
  - build
  - test
  - analyze
  - package
  - prerelease_publish
  - pre_release
  - release_publish
  - post_release

variables:
  VERSION_BUMP_LEVEL: minor
  RELEASE_TYPE: release
  GIT_SUBMODULE_STRATEGY: recursive
  BASE_IMAGE_TAG: '${CI_REGISTRY_IMAGE}:base-${CI_COMMIT_SHORT_SHA}'
  # Set to 'true' to run the non-merge feature pipeline (build/test/package/publish on feature branches).
  # When 'true', the merge request pipeline is skipped, which blocks merging to main.
  # Set back to 'false' (or remove override) to re-enable the merge pipeline before merging.
  RUN_FEATURE_PIPELINE: 'false'
  # Set to 'true' to run all jobs against every package (lint, test, sonar, etc.)
  # instead of only affected/changed packages. The pre-merge gate will block merge
  # while this is set, so remember to set it back to 'false' before merging.
  MERGE_PIPELINE_RUN_ALL: 'false'

image: ${BASE_IMAGE_TAG}

before_script:
  - git config advice.addIgnoredFile false
  - git config --global user.name "CICD"
  - git config --global user.email "ci@example.com"

# =============================================================================
# Shared Templates
# =============================================================================

# Template: Kaniko-based Docker image build
.base_image_template:
  stage: base_image
  tags:
    - arch:amd64
    - size:2xlarge
  cache: {} # This disables cache for this job
  before_script: [] # Disable global before_script
  image:
    name: ${MDAA_BASE_IMAGE}
    entrypoint: ['']
  script:
    # This unreadable echo command is recommended in kaniko docs: https://docs.gitlab.com/ee/ci/docker/using_kaniko.html
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/.pipeline/Dockerfile"
      --destination "${BASE_IMAGE_TAG}"
      --cache=true --cache-repo="${CI_REGISTRY_IMAGE}/cache" --cleanup --cache-ttl 72h0m0s

# =============================================================================
# Shared Jobs (SAST / Security Scanning)
# =============================================================================

include:
  # Gitlab built-in SAST
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml

# SAST scan
sast:
  stage: prebuild
  interruptible: true
  after_script:
    - mkdir reports
    - cp gl-sast-report.json reports/$CI_JOB_NAME.json
  artifacts:
    paths:
      - reports/

# Semgrep SAST scan (excludes CDK TS under **/lib as it is not application code)
# Other code (such as Lambda, application code) should typically be
# under ./src and will be included.
semgrep-sast:
  interruptible: true
  stage: prebuild
  variables:
    SAST_EXCLUDED_PATHS: 'spec, test, tests, tmp, scripts, **/lib/*.ts'
  after_script:
    - echo "Analyzing GitLab SAST reports"
    - python3 ./scripts/quality/analyze_sast_reports.py

# Secret detection scan
secret_detection:
  interruptible: true
  stage: prebuild

# =============================================================================
# Pipeline 1: Feature Merge Pipeline (merge requests)
# =============================================================================
# Triggered on merge request events. Validates, builds, tests, and analyzes
# changes before they are merged to main.
# Stage order: base_image -> prebuild -> build -> test -> analyze
# =============================================================================

# Build the base Docker image for merge request pipelines
feature_merge_base_image:
  extends: .base_image_template
  interruptible: true
  only:
    - merge_requests

# --- prebuild stage ---

# Validate package configurations
feature_validate_packages:
  interruptible: true
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/quality/validate_packages.sh

# Lint TypeScript/JavaScript source
feature_merge_lint:
  interruptible: true
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    GIT_DEPTH: '0'
  script:
    - echo "Running npm_install_repo.sh script"
    - ./scripts/build/npm_install_repo.sh
    - echo "Completed npm_install_repo.sh"
    - echo "Executing npm run lint"
    - npm run lint

# Lint Python source
feature_merge_lint_python:
  interruptible: true
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  script:
    - ./scripts/quality/lint_python.sh

# Verify the feature branch is up to date with the target branch before proceeding
feature_check_target:
  interruptible: true
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  artifacts:
    paths:
      - '*'
    exclude:
      - .git
      - .git/**/*
    untracked: false
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/ci/check_target.sh

# --- build stage ---

# Validate dependency tree after merge
feature_validate_dependencies:
  interruptible: true
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: build
  dependencies:
    - feature_check_target
  needs:
    - feature_check_target
  script:
    - ./scripts/quality/validate_dependencies.sh

# Build and run TypeScript/JavaScript tests
feature_merge_build_test:
  interruptible: true
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: build
  dependencies:
    - feature_check_target
  needs:
    - feature_check_target
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: push
  artifacts:
    untracked: false
    paths:
      - '*'
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    GIT_DEPTH: '0'
  script:
    - ./scripts/quality/git_secrets.sh
    - ./scripts/build/npm_install_repo.sh
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - npm run test

# Run Python tests (after build_test to reuse node_modules cache)
feature_merge_python_test:
  interruptible: true
  stage: test
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    - key: feature-merge-build-$CI_COMMIT_SHA
      paths:
        - node_modules/
        - packages/**/node_modules/
        - .nx/
      policy: pull
    - key: feature-merge-python-$CI_COMMIT_SHA
      paths:
        - '**/python-tests/.venv/'
        - '**/python-tests/uv.lock'
      policy: pull-push
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: '**/python-tests/coverage.xml'
    paths:
      - '**/python-tests/coverage.xml'
      - '**/python-tests/htmlcov/'
    expire_in: 1 week
  script:
    - echo "Running Python tests with coverage..."
    - npm run test:python

# --- test stage ---

# Build and validate documentation
feature_merge_test_docs:
  interruptible: true
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: test
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: false
  script:
    - echo -e "\e[0Ksection_start:$(date +%s):prepare\r\e[0KPrepare docs output"
    - source ./scripts/generate_docs/prepare.sh
    - echo -e "\e[0Ksection_end:$(date +%s):prepare\r\e[0K"
    - echo -e "\e[0Ksection_start:$(date +%s):typedocs\r\e[0KGenerate TypeDocs"
    - ./scripts/generate_docs/typedocs.sh
    - echo -e "\e[0Ksection_end:$(date +%s):typedocs\r\e[0K"
    - echo -e "\e[0Ksection_start:$(date +%s):mkdocs\r\e[0KBuild MkDocs Site"
    - ./scripts/generate_docs/mkdocs.sh
    - echo -e "\e[0Ksection_end:$(date +%s):mkdocs\r\e[0K"

# =============================================================================
# GitLab Pages (serves docs directly from this repo)
# =============================================================================

pages:
  interruptible: false
  tags:
    - arch:amd64
    - size:medium
  only:
    refs:
      - main
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  stage: prerelease_publish
  pages:
    publish: internal
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  needs:
    - prerelease_version
    - prerelease_analyze
  dependencies:
    - prerelease_version
    - prerelease_analyze
  allow_failure: false
  script:
    - source ./scripts/generate_docs/prepare.sh
    - ./scripts/generate_docs/typedocs.sh
    - ./scripts/generate_docs/mkdocs.sh
    - mv target/docs_site internal
  artifacts:
    paths:
      - internal

# Template: Integration test base configuration (used by feature_merge_integ_split_* jobs)
.integ_test_template: &integ_test_template
  interruptible: true
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: test
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: true

# Integration test split 0 (us-east-2)
feature_merge_integ_split_0:
  <<: *integ_test_template
  script:
    - ./scripts/test/bootstrap-integ.sh
    - python3 ./scripts/test/run-integ-tests.py split_0
    # - ./scripts/test/bootstrap-integ.sh --teardown
  resource_group: integ-us-east-2
  variables:
    AWS_CREDS_TARGET_ROLE: '${INTEG_TESTING_ROLE_ARN}'
    AWS_REGION: us-east-2

# Integration test split 1 (us-west-1)
feature_merge_integ_split_1:
  <<: *integ_test_template
  script:
    - ./scripts/test/bootstrap-integ.sh
    - python3 ./scripts/test/run-integ-tests.py split_1
    # - ./scripts/test/bootstrap-integ.sh --teardown
  resource_group: integ-us-west-1
  variables:
    AWS_CREDS_TARGET_ROLE: '${INTEG_TESTING_ROLE_ARN}'
    AWS_REGION: us-west-1

# Integration test split 2 (us-west-2)
feature_merge_integ_split_2:
  <<: *integ_test_template
  script:
    - ./scripts/test/bootstrap-integ.sh
    - python3 ./scripts/test/run-integ-tests.py split_2
    # - ./scripts/test/bootstrap-integ.sh --teardown
  resource_group: integ-us-west-2
  variables:
    AWS_CREDS_TARGET_ROLE: '${INTEG_TESTING_ROLE_ARN}'
    AWS_REGION: us-west-2

# --- analyze stage ---

# Run baseline review against previous release
feature_merge_baseline_review:
  interruptible: true
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
    GIT_DEPTH: '0'
    KIRO_API_KEY: '${KIRO_API_KEY}'
    # Set to 'false' to enable Kiro risk assessment (requires kiro-cli in the base image and KIRO_API_KEY)
    SKIP_RISK_ASSESSMENT: 'true'
  script:
    - python3 ./scripts/quality/baseline_review.py --output-dir baseline-review
    - python3 ./scripts/quality/post_baseline_threads.py --report baseline-review/report.json
  artifacts:
    paths:
      - baseline-review/report.json
    reports:
      junit: baseline-review/junit-report.xml
    when: always

# Scan the target branch (main) to establish the SonarQube baseline so
# that MR changes are correctly classified as "new code".
feature_merge_sonarqube_target:
  interruptible: true
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: prebuild
  dependencies:
    - feature_merge_base_image
  needs:
    - feature_merge_base_image
  variables:
    GIT_DEPTH: '0'
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  allow_failure: false
  script:
    - ./scripts/quality/sonarqube-target-baseline.sh

# Run SonarQube analysis
feature_merge_sonarqube:
  interruptible: true
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
    - feature_merge_sonarqube_target
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  variables:
    GIT_DEPTH: '0'
  allow_failure: false
  script:
    - ./scripts/quality/sonarqube.sh

# Pre-merge gate: blocks merge when MERGE_PIPELINE_RUN_ALL=true.
# All other jobs run and succeed normally so you get full results;
# only this lightweight gate fails to prevent an accidental merge.
feature_merge_pre_merge_check:
  interruptible: true
  tags:
    - arch:amd64
    - size:small
  only:
    - merge_requests
  stage: analyze
  needs:
    - feature_merge_sonarqube
  allow_failure: false
  script:
    - |
      if [ "${MERGE_PIPELINE_RUN_ALL}" = "true" ]; then
        echo "============================================================"
        echo "MERGE_PIPELINE_RUN_ALL=true — full-repo analysis completed successfully."
        echo "Failing this gate to prevent merge."
        echo "Set MERGE_PIPELINE_RUN_ALL to 'false' and re-run the pipeline to unblock."
        echo "============================================================"
        exit 1
      fi
      echo "MERGE_PIPELINE_RUN_ALL is not set — merge is allowed."

# Risk assessment (currently disabled)
feature_merge_risk_assessment:
  interruptible: true
  rules:
    - when: never
  tags:
    - arch:amd64
    - size:large
  # only:
  #   - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
      - .nx/
    policy: pull
  allow_failure: true
  variables:
    DIFF_OUTPUT_PATH: './diff-output'
    ASSESSMENT_TIMEOUT: '300'
    BASELINE_BUCKET_REGION: 'us-east-1'
    AWS_CREDS_TARGET_ROLE: '${TESTING_ROLE_ARN}'
  script:
    - ./scripts/quality/risk_assessment.sh
  artifacts:
    paths:
      - diff-output/
    when: always

# =============================================================================
# Pipeline 2: Feature Branch Pipeline (non-merge feature branches)
# =============================================================================
# Triggered when RUN_FEATURE_PIPELINE=true on non-main, non-tag, non-MR branches.
# Builds, tests, packages, and publishes prerelease artifacts for the feature branch.
# Stage order: base_image -> prebuild -> build -> package -> prerelease_publish
# =============================================================================

# Template: Feature branch pipeline rules (non-merge)
.feature_branch_template:
  interruptible: true
  rules:
    - if: '$RUN_FEATURE_PIPELINE == "true" && $CI_PIPELINE_SOURCE != "merge_request_event" && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null'

# Build the base Docker image for feature branch pipelines
feature_base_image:
  extends:
    - .base_image_template
    - .feature_branch_template

# --- prebuild stage ---

# Version bump and install dependencies
feature_version:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:large
  stage: prebuild
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/publish/version_prerelease.sh
    - ./scripts/build/npm_install_repo.sh

# --- build stage ---

# Build and run TypeScript/JavaScript tests
feature_build_test:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:3xlarge
  stage: build
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_version
  needs:
    - feature_version
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  script:
    - npm run build
    - ./scripts/ci/check_schema_drift.sh
    - npm run test

# Run Python tests (after build_test to reuse node_modules cache)
feature_python_test:
  extends: .feature_branch_template
  stage: test
  tags:
    - arch:amd64
    - size:large
  dependencies:
    - feature_build_test
  needs:
    - feature_build_test
  cache:
    - key: feature-build-$CI_COMMIT_SHA
      paths:
        - node_modules/
        - packages/**/node_modules/
      policy: pull
    - key: feature-python-$CI_COMMIT_SHA
      paths:
        - '**/python-tests/.venv/'
        - '**/python-tests/uv.lock'
      policy: pull-push
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: '**/python-tests/coverage.xml'
    paths:
      - '**/python-tests/coverage.xml'
      - '**/python-tests/htmlcov/'
    expire_in: 1 week
  script:
    - echo "Running Python tests with coverage..."
    - npm run test:python

# --- package stage ---

# Package JSII distributions
feature_package:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:large
  stage: package
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - lerna.json
      - target
      - packages/**/jsii-dist
    exclude:
      - '**/node_modules/**'
  dependencies:
    - feature_build_test
  needs:
    - feature_build_test
  allow_failure: false
  script:
    - ./scripts/build/package_repo.sh

# --- prerelease_publish stage ---

# Publish NPM packages to prerelease CodeArtifact repo
feature_publish_npm:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:medium
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
  needs:
    - feature_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/publish/publish_npm.sh $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $CI_COMMIT_REF_SLUG

# Verify published NPM packages are installable
feature_test_published_npm:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:medium
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
    - feature_publish_npm
  needs:
    - feature_package
    - feature_publish_npm
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - SNAPSHOT_VERSION=$(jq -r .version < lerna.json)
    - echo 'Testing published artifacts for version:' $SNAPSHOT_VERSION
    - ./scripts/publish/test_published_artifacts.sh $SNAPSHOT_VERSION $MDAA_CODEARTIFACT_PRERELEASE_NPM_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT $CI_COMMIT_REF_SLUG

# Publish Python packages to prerelease CodeArtifact repo
feature_publish_pip:
  extends: .feature_branch_template
  tags:
    - arch:amd64
    - size:medium
  stage: prerelease_publish
  cache:
    key: feature-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  dependencies:
    - feature_package
  needs:
    - feature_package
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/publish/publish_pip.sh $MDAA_CODEARTIFACT_PRERELEASE_PIP_REPO $MDAA_CODEARTIFACT_PRERELEASE_DOMAIN $MDAA_CODEARTIFACT_PRERELEASE_ACCOUNT

# =============================================================================
# Pipeline 3: Prerelease Pipeline (main branch)
# =============================================================================
# Triggered on commits to main (excluding tags). Versions, builds, tests,
# analyzes, packages, and publishes prerelease artifacts.
# Stage order: base_image -> prebuild -> build -> analyze -> package -> prerelease_publish
# =============================================================================

# Build the base Docker image for prerelease pipelines
prerelease_base_image:
  extends: .base_image_template
  only:
    refs:
      - main
  except:
    refs:
      - tags

# --- prebuild stage ---

# Version bump, secret scan, and install dependencies
prerelease_version:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    refs:
      - main
  except:
    refs:
      - tags
  cache:
    key: prerelease-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
    exclude:
      - '**/node_modules/**'
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/quality/git_secrets.sh
