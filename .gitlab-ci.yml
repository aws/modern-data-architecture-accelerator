stages:
  - prebuild
  - build
  - test
  - analyze
  - package
  - prerelease_publish
  - pre_release
  - release_publish
  - post_release

include:
  # Gitlab built-in SAST
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml
  # AWS Solutions SAST
  - project: $CI_PROJECT_NAMESPACE/mdaa-delivery
    ref: main
    file: "/aws-solutions/viperlight.yaml"
  - project: $CI_PROJECT_NAMESPACE/mdaa-testing
    ref: main
    file: "/gitlab-ci/mdaa-testing.yaml"

sast:
  stage: prebuild
  after_script:
    - mkdir reports
    - cp gl-sast-report.json reports/$CI_JOB_NAME.json
  artifacts:
    paths:
      - reports/

# Exclude bulk of CDK TS under **/lib from semgrep, as it is not application code.
# Other code (such as Lambda, application code) should typically be
# under ./src and will be included.
semgrep-sast:
  stage: prebuild
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, scripts, **/lib/*.ts"
  after_script: 
    - echo "Analyzing GitLab SAST reports"
    - python3 ./scripts/analyze_sast_reports.py

secret_detection:
  stage: prebuild

viperlight_prebuild:
  stage: prebuild

viperlight_postbuild:
  stage: analyze

# Build image has CDK, Node/NPM, Lerna, Python, SonarQube pre installed
image: $MDAA_BUILD_IMAGE

variables:
  VERSION_BUMP_LEVEL: minor
  RELEASE_TYPE: release
  GIT_SUBMODULE_STRATEGY: recursive

before_script:
  - git config advice.addIgnoredFile false
  - git config --global user.name "CICD"
  - git config --global user.email "ci@example.com"

feature_merge_lint:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: "${DEV_ROLE_ARN}"
  script:
    - echo "Running npm_install.sh script"
    - ./scripts/npm_install.sh
    - echo "Completed npm_install.sh"
    - echo "Executing lint.sh script"
    - ./scripts/lint.sh

feature_merge_main:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: prebuild
  artifacts:
    paths:
      - "*"
    exclude:
      - .git
      - .git/**/*
    untracked: false
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: "${DEV_ROLE_ARN}"
  script:
    - ./scripts/merge_main.sh

feature_merge_build_test:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: build
  dependencies:
    - feature_merge_main
  needs:
    - feature_merge_main
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - "*"
    exclude:
      - "**/node_modules/**"
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: "${DEV_ROLE_ARN}"
  script:
    - ./scripts/git_secrets.sh
    - ./scripts/npm_install.sh
    - ./scripts/build_test.sh

feature_merge_python_test:
  stage: build  # Same stage = parallel execution
  tags:
    - arch:amd64
    - size:large  # Smaller than 3xlarge since no TypeScript build
  only:
    - merge_requests
  needs:
    - feature_merge_main  # Same dependency as build_test
  cache:
    key: feature-merge-python-$CI_COMMIT_SHA
    paths:
      - "**/python-tests/.venv/"
      - "**/python-tests/uv.lock"
    policy: pull-push
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "**/python-tests/coverage.xml"
    paths:
      - "**/python-tests/coverage.xml"
      - "**/python-tests/htmlcov/"
    expire_in: 1 week
  script:
    - echo "Installing uv for Python testing..."
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - echo "Verifying uv installation..."
    - which uv
    - uv --version
    - echo "Running Python tests with coverage..."
    - npm run test:python:all

feature_merge_snapshot_test:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - "*"
    exclude:
      - "**/node_modules/**"
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: "${DEV_ROLE_ARN}"
  script:
    - npx lerna run build
    - npm run test:snapshots -- --silent --reporters=default

