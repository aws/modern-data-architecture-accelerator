stages:
  - base_image
  - prebuild
  - build
  - test
  - analyze
  - package
  - prerelease_publish
  - pre_release
  - release_publish
  - post_release

base_image:
  stage: base_image
  cache: {} # This disables cache for this job
  before_script: [] # Disable global before_script
  image:
    name: ${MDAA_BASE_IMAGE}
    entrypoint: ['']
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    # This unreadable echo command is recommended in kanito docs: https://docs.gitlab.com/ee/ci/docker/using_kaniko.html
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/.pipeline/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:base-latest"
      --destination "${CI_REGISTRY_IMAGE}:base-${CI_COMMIT_SHA:0:8}"
      --cache=true --cache-repo="${CI_REGISTRY_IMAGE}/cache" --cleanup --cache-ttl 72h0m0s
  tags:
    - arch:amd64
    - size:2xlarge
  rules:
    - when: always

image: ${CI_REGISTRY_IMAGE}:base-latest

include:
  # Gitlab built-in SAST
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml
  # AWS Solutions SAST
  - project: $CI_PROJECT_NAMESPACE/mdaa-testing
    ref: main
    file: '/gitlab-ci/mdaa-testing.yaml'

sast:
  stage: prebuild
  after_script:
    - mkdir reports
    - cp gl-sast-report.json reports/$CI_JOB_NAME.json
  artifacts:
    paths:
      - reports/

# Exclude bulk of CDK TS under **/lib from semgrep, as it is not application code.
# Other code (such as Lambda, application code) should typically be
# under ./src and will be included.
semgrep-sast:
  stage: prebuild
  variables:
    SAST_EXCLUDED_PATHS: 'spec, test, tests, tmp, scripts, **/lib/*.ts'
  after_script:
    - echo "Analyzing GitLab SAST reports"
    - python3 ./scripts/analyze_sast_reports.py

secret_detection:
  stage: prebuild

variables:
  VERSION_BUMP_LEVEL: minor
  RELEASE_TYPE: release
  GIT_SUBMODULE_STRATEGY: recursive

before_script:
  - git config advice.addIgnoredFile false
  - git config --global user.name "CICD"
  - git config --global user.email "ci@example.com"

feature_validate_dependencies:
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  script:
    - ./scripts/validate_dependencies.sh

feature_validate_packages:
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/validate_packages.sh

feature_merge_lint:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - echo "Running npm_install.sh script"
    - ./scripts/npm_install.sh
    - echo "Completed npm_install.sh"
    - echo "Executing lint.sh script"
    - ./scripts/lint.sh

feature_merge_lint_python:
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  allow_failure: false
  script:
    - ./scripts/lint_python.sh

feature_merge_main:
  tags:
    - arch:amd64
    - size:medium
  only:
    - merge_requests
  stage: prebuild
  artifacts:
    paths:
      - '*'
    exclude:
      - .git
      - .git/**/*
    untracked: false
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/merge_main.sh

feature_merge_build_test:
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: build
  dependencies:
    - feature_merge_main
  needs:
    - feature_merge_main
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - '*'
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/git_secrets.sh
    - ./scripts/npm_install.sh
    - ./scripts/build_test.sh

feature_merge_python_test:
  stage: build # Same stage = parallel execution
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  needs:
    - feature_merge_main # Same dependency as build_test
  cache:
    key: feature-merge-python-$CI_COMMIT_SHA
    paths:
      - '**/python-tests/.venv/'
      - '**/python-tests/uv.lock'
    policy: pull-push
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: '**/python-tests/coverage.xml'
    paths:
      - '**/python-tests/coverage.xml'
      - '**/python-tests/htmlcov/'
    expire_in: 1 week
  script:
    - echo "Running Python tests with coverage..."
    - npm run test:python:all

feature_merge_snapshot_test:
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - '*'
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - npx lerna run build
    - npx lerna run test:snapshots --stream -- --silent --reporters=default

feature_merge_sonarqube:
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  allow_failure: true
  script:
    - ./scripts/sonarqube.sh

feature_merge_smoke_test:
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  ## optionally state which mdaa-testing branch
  variables:
    CAEF_TESTING_BRANCH: main


feature_merge_risk_assessment:
  tags:
    - arch:amd64
    - size:large
  only:
    - merge_requests
  stage: analyze
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  allow_failure: true
  variables:
    DIFF_OUTPUT_PATH: "./diff-output"
    ASSESSMENT_TIMEOUT: "300"
    BASELINE_BUCKET_REGION: "us-east-1"
    AWS_CREDS_TARGET_ROLE: "${TESTING_ROLE_ARN}"
  script:
    - ./scripts/risk_assessment.sh
  artifacts:
    paths:
      - diff-output/
    when: always

.integ_test_template: &integ_test_template
  tags:
    - arch:amd64
    - size:3xlarge
  only:
    - merge_requests
  stage: test
  dependencies:
    - feature_merge_build_test
  needs:
    - feature_merge_build_test
  cache:
    key: feature-merge-build-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  allow_failure: true

# --- Integration test jobs (bootstrap + test + teardown) ---

feature_merge_integ_split_0:
  <<: *integ_test_template
  script:
    - ./scripts/bootstrap-integ.sh
    - python3 ./scripts/run-integ-tests.py split_0
    # - ./scripts/bootstrap-integ.sh --teardown
  resource_group: integ-us-east-2
  variables:
    AWS_CREDS_TARGET_ROLE: "${TESTING_ROLE_ARN}"
    AWS_REGION: us-east-2

feature_merge_integ_split_1:
  <<: *integ_test_template
  script:
    - ./scripts/bootstrap-integ.sh
    - python3 ./scripts/run-integ-tests.py split_1
    # - ./scripts/bootstrap-integ.sh --teardown
  resource_group: integ-us-west-1
  variables:
    AWS_CREDS_TARGET_ROLE: "${TESTING_ROLE_ARN}"
    AWS_REGION: us-west-1

feature_merge_integ_split_2:
  <<: *integ_test_template
  script:
    - ./scripts/bootstrap-integ.sh
    - python3 ./scripts/run-integ-tests.py split_2
    # - ./scripts/bootstrap-integ.sh --teardown
  resource_group: integ-us-west-2
  variables:
    AWS_CREDS_TARGET_ROLE: "${TESTING_ROLE_ARN}"
    AWS_REGION: us-west-2

