release_version_package:
  when: manual
  environment: release
  tags:
    - arch:amd64
    - size:3xlarge
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: push
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - target
      - schemas
      - solution-manifest.yaml
    exclude:
      - '**/node_modules/**'
  allow_failure: false
  needs:
    - prerelease_analyze
  dependencies: []
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'
  script:
    - ./scripts/git_secrets.sh
    - ./scripts/npm_install.sh
    - ./scripts/version_release.sh
    - ./scripts/build_test.sh
    - npx lerna run test:snapshots:update --stream
    - ./scripts/package.sh

release:
  tags:
    - arch:amd64
    - size:medium
  environment: release
  when: manual
  manual_confirmation: 'Are you sure you want to create a $VERSION_BUMP_LEVEL $RELEASE_TYPE version?'
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: pre_release
  dependencies: []
  needs:
    - release_version_package
  allow_failure: false
  script:
    - echo "Releasing "

# Publishes latest release version back to prerelease
release_publish_npm_prerelease:
  tags:
    - arch:amd64
    - size:medium
  except:
    variables:
      - $GITLAB_USER_NAME == "CI_GROUP_TOKEN"
    refs:
      - tags
  only:
    refs:
      - main
  stage: release_publish
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  artifacts:
    untracked: false
    paths:
      - package.json
      - lerna.json
      - package-lock.json
      - packages
      - schemas
      - target
      - solution-manifest.yaml
    exclude:
      - '**/node_modules/**'
  dependencies:
    - release_version_package
  needs:
