cornerstone_build_distributions:
  when: manual
  manual_confirmation: 'This will build, package, and upload the Cornerstone distribution. Continue?'
  tags:
    - arch:amd64
    - size:xlarge
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: post_release
  dependencies:
    - release_version_package
  needs:
    - release_version_package
  cache:
    key: release-$CI_COMMIT_SHA
    paths:
      - node_modules/
      - packages/**/node_modules/
    policy: pull
  before_script:
    - 'apt-get update && apt-get install -y jq'
  script:
    - "export PUBLISHED_VERSION=v$(cat package.json | jq -r '.version')"
    - 'echo "Building Cornerstone distributions for version: $PUBLISHED_VERSION"'
    - 'cd deployment'
    - 'source ./solution_config'
    - 'chmod +x ./build-s3-dist.sh && ./build-s3-dist.sh temp-bucket $PUBLISHED_VERSION'
    - 'chmod +x ./build-open-source-dist.sh && ./build-open-source-dist.sh $SOLUTION_TRADEMARKEDNAME'
  artifacts:
    name: cornerstone-distributions
    when: on_success
    untracked: true
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'

cornerstone_package_artifact:
  tags:
    - arch:amd64
    - size:large
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: post_release
  dependencies:
    - release_version_package
    - cornerstone_build_distributions
  needs:
    - release_version_package
    - cornerstone_build_distributions
  before_script:
    - 'apt-get update && apt-get install -y zip jq'
  script:
    - "export PUBLISHED_VERSION=v$(cat package.json | jq -r '.version')"
    - 'echo "Packaging Cornerstone artifact for version: $PUBLISHED_VERSION"'
    - echo "Creating cornerstone artifact archive..."
    - |
      zip -q -r artifact.zip \
        package.json \
        lerna.json \
        packages/ \
        target/ \
        schemas/ \
        scripts/ \
        .gitignore \
        .cdxgen.json \
        .cdxgenignore \
        sonar-project.properties \
        README.md \
        LICENSE.txt \
        NOTICE.txt \
        CODE_OF_CONDUCT.md \
        CONTRIBUTING.md \
        buildspec.yml \
        CHANGELOG.md \
        SECURITY.md \
        .viperlightignore \
        solution-manifest.yaml \
        deployment/
    - echo "Archive created successfully ($(du -h artifact.zip | cut -f1))"
  artifacts:
    name: cornerstone-packaged-artifact
    when: on_success
    paths:
      - artifact.zip
  allow_failure: false
  variables:
    AWS_CREDS_TARGET_ROLE: '${DEV_ROLE_ARN}'

cornerstone_upload:
  tags:
    - arch:amd64
    - size:large
  only:
    refs:
      - main
  except:
    refs:
      - tags
  stage: post_release
  dependencies:
    - release_version_package
    - cornerstone_package_artifact
  needs:
    - release_version_package
    - cornerstone_package_artifact
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_CREDS_TARGET_ROLE: '${CORNERSTONE_ROLE_ARN}'
    CORNERSTONE_PACKAGE_BUCKET: '${CORNERSTONE_PACKAGE_BUCKET}'
  before_script:
    - 'apt-get update && apt-get install -y jq'
  script:
    - "export PUBLISHED_VERSION=v$(cat package.json | jq -r '.version')"
    - 'echo "Uploading Cornerstone artifact for version: $PUBLISHED_VERSION"'
    - 'export AUTHOR_EMAIL=$(echo "$CI_COMMIT_AUTHOR" | grep -oP ''(?<=<).*(?=>)'' || echo "unknown")'
    - aws s3 cp artifact.zip s3://$CORNERSTONE_PACKAGE_BUCKET/SO0320/$PUBLISHED_VERSION/$CI_COMMIT_SHA/artifact.zip --metadata "package=ModernDataArchitectureAccelerator,commitId=$CI_COMMIT_SHA,solutionId=SO0320,solutionVersion=$PUBLISHED_VERSION,solutionName=modern-data-architecture-accelerator,commitauthor=$AUTHOR_EMAIL,publishpublicecrimage=false,commitmessage=$CI_COMMIT_MESSAGE,committimestamp=$CI_COMMIT_TIMESTAMP,enablequicksight=No,branch=$CI_COMMIT_MESSAGE"
    - 'echo "Published solution archive to s3://$CORNERSTONE_PACKAGE_BUCKET/SO0320/$PUBLISHED_VERSION/$CI_COMMIT_SHA/artifact.zip"'
  allow_failure: false
