# Arns for IAM roles which will be provided to the projects's resources (IE bucket)
dataAdminRoles:
  # This is an arn which will be resolved first to a role ID for inclusion in the bucket policy.
  # Note that this resolution will require iam:GetRole against this role arn for the role executing CDK.
  - id: ssm:/{{org}}/shared/generated-role/data-admin/id

# List of roles which will be used to execute dataops processes using project resources
projectExecutionRoles:
  - id: ssm:/{{org}}/shared/generated-role/glue-etl/id

s3OutputKmsKeyArn: ssm:/{{org}}/shared/datalake/kms/arn
glueCatalogKmsKeyArn: ssm:/{{org}}/shared/glue-catalog/kms/arn

# Project-level Lake Formation configuration
# Defines tag vocabulary that can be used across all databases in the project
lakeFormation:
  # Define Lake Formation tags with all possible values (tag vocabulary)
  # These tags are created at the account level and can be used by any database
  lfTags:
    - tagKey: environment
      tagValues: [dev, test, prod]
    - tagKey: data_tier
      tagValues: [bronze, silver, gold]
    - tagKey: data_classification
      tagValues: [public, internal, confidential]

# List of Databases to create within the project.
databases:
  # This database will be used to illustrate access grants
  # using LakeFormation.
  sample-database:
    description: Sample Database
    # The data lake S3 bucket and prefix location where the database data is stored.
    # Project execution roles will be granted access to create Glue tables
    # which point to this location.
    locationBucketName: ssm:/{{org}}/shared/datalake/bucket/transformed/name
    locationPrefix: data/sample_data

    # (Optional) - The LF configuration which will be applied to the database
    lakeFormation:
      # (Optional) - If true (default false), LF superuser grants will be automatically added for project admin roles.
      # This will allow data admin to perform administrative actions against the database and its tables.
      createSuperGrantsForDataAdminRoles: true
      # (Optional) - If true (default false), LF read/write grants will be automatically added for project execution roles.
      # This will allow execution roles to create/update/delete tables and partitions within the database.
      createReadWriteGrantsForProjectExecutionRoles: true
      # (Optional) A list of grants to be provided for user principals to the database
      grants:
        data-user-read:
          principalArns:
            data-user: ssm:/{{org}}/shared/generated-role/data-user/arn

  # This database demonstrates Lake Formation tag-based access control (TBAC)
  sample-tagged-database:
    description: Sample Database with Tag-Based Access Control
    locationBucketName: ssm:/{{org}}/shared/datalake/bucket/transformed/name
    locationPrefix: data/sample_tagged_data

    lakeFormation:
      # Automatic grants for admin and execution roles
      createSuperGrantsForDataAdminRoles: true
      createReadWriteGrantsForProjectExecutionRoles: true

      # Assign specific tag values to this database
      # This classifies the database itself with these specific tag values
      # Values must be from the project-level lakeFormation.lfTags definitions
      databaseTagValues:
        - tagKey: environment
          tagValues: [dev]
        - tagKey: data_tier
          tagValues: [bronze]
        - tagKey: data_classification
          tagValues: [public]

      # Define tag-based grants using LF-Tag expressions
      # Permissions are granted based on tag values rather than specific resources
      # Tag keys and values must be from the project-level lakeFormation.lfTags definitions
      tagBasedGrants:
        # Grant for development environment access
        dev_access:
          principalArns:
            # Replace with actual IAM role ARN or use SSM parameter
            dev-role: ssm:/{{org}}/shared/generated-role/data-user/arn
          permissions: [DESCRIBE, SELECT]
          resourceType: TABLE
          lfTagExpression:
            environment: [dev]
            data_tier: [bronze, silver]
        
        # Grant for production read access to public/internal data
        prod_read_access:
          principalArns:
            # Replace with actual IAM role ARN or use SSM parameter
            prod-reader: ssm:/{{org}}/shared/generated-role/data-user/arn
          permissions: [DESCRIBE, SELECT]
          resourceType: TABLE
          lfTagExpression:
            environment: [prod]
            data_classification: [public, internal]


