[project]
name = "datazone-constructs-tests"
version = "0.1.0"
description = "DataZone Constructs Lambda Function Tests"
requires-python = ">=3.9"
dependencies = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.1",
    "boto3>=1.28.0",
    "botocore>=1.31.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--tb=short",
]

[tool.coverage.run]
source = ["../src/lambda/check_user_profiles", "../src/lambda/create_project_membership", "../src/lambda/domain_config", "../src/lambda/environment_blueprint", "../src/lambda/monitor_env_deployment"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]
