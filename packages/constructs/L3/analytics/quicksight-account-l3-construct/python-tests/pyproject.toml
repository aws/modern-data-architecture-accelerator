[project]
name = "quicksight-account-l3-construct-tests"
version = "0.1.0"
description = "QuickSight Account L3 Construct Python Tests"
requires-python = ">=3.9"
dependencies = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.1",
    "boto3>=1.28.0",
    "botocore>=1.31.0",
    "moto[quicksight]>=4.2.0",
    "responses>=0.23.0"
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--disable-warnings"
]
markers = [
    "unit: Unit tests",
    "lambda: Lambda function tests",
    "integration: Integration tests"
]

[tool.coverage.run]
source = ["../src/python"]
omit = [
    "test_*",
    "conftest.py",
    ".venv/*",
    "*/site-packages/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError"
]