[project]
name = "gaia-v2-l3-construct-tests"
version = "0.1.0"
description = "Unit tests for the GAIA v2 L3 construct Python Lambda handlers."
requires-python = ">=3.9"
dependencies = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.1",
    "moto>=4.2.0",
    "boto3>=1.28.0",
    "boto3-stubs[dynamodb,comprehend]>=1.28.0",
    "aws-lambda-powertools>=2.0.0",
    "aws-xray-sdk>=2.12.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "unit: Unit tests",
]
