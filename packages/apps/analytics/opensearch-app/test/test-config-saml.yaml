domain:
  dataAdminRole:
    arn: arn:{{partition}}:iam::{{account}}:role/test-admin

  opensearchDomainName: osdomain-saml

  vpcId: vpc-a1b2c3d4

  subnets:
    - subnetId: subnet-1a2b3c4d
      availabilityZone: "{{region}}a"

  securityGroupIngress:
    sg:
      - sg-u5x6y7z8

  capacity:
    dataNodes: 1
    dataNodeInstanceType: r6g.large.search

  ebs:
    enabled: true
    volumeSize: 20
    volumeType: gp2

  automatedSnapshotStartHour: 23

  opensearchEngineVersion: "2.3"

  enableVersionUpgrade: true

  accessPolicies:
    - SID: testing
      Effect: Allow
      Principal:
        AWS:
          - "arn:{{partition}}:iam::{{account}}:root"
      Resource: "arn:{{partition}}:es:{{region}}:{{account}}:domain/test-domain/*"
      Action: es:*

  # SAML authentication configuration for SSO
  samlAuthentication:
    idpEntityId: "https://portal.sso.us-east-1.amazonaws.com/saml/assertion/ABC123"
    idpMetadataXml: |
      <?xml version="1.0"?>
      <EntityDescriptor xmlns="urn:oasis:names:tc:SAML:2.0:metadata" entityID="test-idp">
        <IDPSSODescriptor protocolSupportEnumeration="urn:oasis:names:tc:SAML:2.0:protocol">
        </IDPSSODescriptor>
      </EntityDescriptor>
