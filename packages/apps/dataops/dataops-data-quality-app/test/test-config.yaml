# (Optional) Name of the Data Ops Project
# Name the project the resources of which can be used by this data quality app.
# Other resources within the project can be referenced in the config using
# the "project:" prefix on the config value.
projectName: test-dataops-project

rulesets:
  customer-data-quality:
    description: Validate customer data completeness and uniqueness
    targetTable:
      databaseName: project:databaseName/customer-data
      tableName: customers
    ruleset:
      - ruleType: IsComplete
        column: customer_id
      - ruleType: Uniqueness
        column: email
        comparisonOperator: '>'
        threshold: 0.95
      - ruleType: RowCount
        comparisonOperator: '>'
        value: 100

  order-data-quality:
    description: Validate order data freshness and values
    targetTable:
      databaseName: project:databaseName/order-data
      tableName: orders
    ruleset: |
      Rules = [
        IsComplete "order_id",
        ColumnValues "status" in ["pending", "completed", "cancelled"],
        RowCount > 0
      ]
