agentRuntimeName: testAgentRuntime
description: "Test agent runtime for unit testing"
agentRuntimeArtifact:
  containerConfiguration:
    containerUri: "123456789012.dkr.ecr.us-east-1.amazonaws.com/test-runtime:latest"
environmentVariables:
  ENVIRONMENT: test
  LOG_LEVEL: DEBUG
networkConfiguration:
  securityGroups:
    - sg-12345678
    - sg-87654321
  subnets:
    - subnet-12345678
    - subnet-87654321
    - subnet-abcdef12
lifecycleConfiguration:
  idleRuntimeSessionTimeout: 3600
  maxLifetime: 7200
authorizerConfiguration:
  customJwtAuthorizer:
    discoveryUrl: "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_test/.well-known/openid-configuration"
    allowedAudience:
      - "test-client-id"
runtimeEndpoint:
  name: test_runtime_endpoint
  description: "Test runtime endpoint"
