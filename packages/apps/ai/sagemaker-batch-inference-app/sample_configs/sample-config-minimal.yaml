# Minimal config for the SageMaker Batch Inference module.
# Contains only the required properties for a basic batch
# transform pipeline deployment.

# SageMaker project name used in resource naming
projectName: test-batch-project

# Path to seed code directory or zip file. The seed code is
# pushed to CodeCommit and drives the batch transform pipeline.
# Point this to your project's seed code directory.
seedCodePath: "../test/test-seed-code.zip"

# Model Package Group name from the SageMaker Model Registry
# Often created by the SageMaker MLOps module.
# Example SSM: ssm:/{{org}}/{{domain}}/<mlops_module_name>/training/model-package-group-name
modelPackageGroupName: test-mpg

# S3 bucket containing model artifacts
# Often created by the SageMaker MLOps module.
# Example SSM: ssm:/{{org}}/{{domain}}/<mlops_module_name>/training/model-bucket-name
modelBucketName: test-model-bucket
