# Comprehensive config for the SageMaker Batch Inference module.
# Deploys a CodePipeline-driven batch transform pipeline with
# VPC isolation, custom instance configuration, cross-bucket
# access, and Studio integration tagging.

# SageMaker project name used in resource naming
projectName: test-batch-project

# (Optional) SageMaker domain ID for Studio integration tagging
# Often created by the SageMaker Studio Domain module.
# Example SSM: ssm:/{{org}}/{{domain}}/<sm_studio_domain_module_name>/domain-id
domainId: d-test123

# (Optional) SageMaker domain ARN for Studio integration tagging
# Often created by the SageMaker Studio Domain module.
# Example SSM: ssm:/{{org}}/{{domain}}/<sm_studio_domain_module_name>/domain-arn
domainArn: arn:{{partition}}:sagemaker:{{region}}:{{account}}:domain/d-test123

# Path to seed code directory or zip file. The seed code is
# pushed to CodeCommit and drives the batch transform pipeline.
# Point this to your project's seed code directory.
seedCodePath: "../test/test-seed-code.zip"

# Model Package Group name from the SageMaker Model Registry
# Often created by the SageMaker MLOps module.
# Example SSM: ssm:/{{org}}/{{domain}}/<mlops_module_name>/training/model-package-group-name
modelPackageGroupName: test-mpg

# S3 bucket containing model artifacts
# Often created by the SageMaker MLOps module.
# Example SSM: ssm:/{{org}}/{{domain}}/<mlops_module_name>/training/model-bucket-name
modelBucketName: test-model-bucket

# (Optional) Training pipeline bucket name — set when model
# artifacts live in a different bucket than modelBucketName
# (e.g., CfnPipeline-based training)
# Often created by the SageMaker Pipeline module.
# Example SSM: ssm:/{{org}}/{{domain}}/<pipeline_module_name>/model-bucket-name
trainingPipelineBucketName: test-training-pipeline-bucket

# (Optional) S3 URI for batch transform input data
inputDataS3Uri: s3://test-data-bucket/input/data.csv

# (Optional) S3 prefix for batch transform output
outputDataS3Prefix: s3://test-data-bucket/output/

# (Optional) Instance type for batch transform
# (default: ml.m5.xlarge)
instanceType: ml.m5.xlarge

# (Optional) Instance count for batch transform (default: 1)
instanceCount: 1

# (Optional) Base job prefix for SageMaker job names
baseJobPrefix: test-batch

# (Optional) Enable network isolation for SageMaker jobs
enableNetworkIsolation: true

# (Optional) Subnet IDs for VPC mode
# Often created by your VPC/networking stack.
# Example SSM: ssm:/path/to/subnet/id
subnetIds:
  - subnet-0123456789abcdef0
  - subnet-0123456789abcdef1

# (Optional) Security group IDs for VPC mode
# Often created by your VPC/networking stack.
# Example SSM: ssm:/path/to/security-group/id
securityGroupIds:
  - sg-0123456789abcdef0

# (Optional) Additional S3 bucket names for read access
additionalReadBucketNames:
  - test-shared-data-bucket

# (Optional) Additional S3 bucket names for write access
additionalWriteBucketNames:
  - test-output-bucket
