AWSTemplateFormatVersion: "2010-09-09"
Description: |
  Optional VPC infrastructure for GenAI Accelerator deployment.
  
  This template creates a VPC with public and private subnets suitable for
  deploying the GenAI Accelerator. It includes NAT Gateway for outbound internet 
  access from private subnets (required for Lambda functions to reach AWS services).
  
  USAGE:
    aws cloudformation deploy \
      --template-file genai-vpc.yaml \
      --stack-name genai-reference-infra \
      --parameter-overrides \
        EnvironmentName=dev \
        ActivateNatGateway=true
  
  After deployment, the VPC and subnet IDs are stored in SSM parameters
  that can be referenced in your mdaa.yaml using the resolve:ssm syntax.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name (used in resource naming and SSM paths)
    AllowedPattern: "[a-z0-9-]+"

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: CIDR block for the VPC

  # Public subnets (for NAT Gateway, load balancers)
  PublicSubnetACidr:
    Type: String
    Default: "10.0.1.0/24"
    Description: CIDR for public subnet in AZ-a

  PublicSubnetBCidr:
    Type: String
    Default: "10.0.2.0/24"
    Description: CIDR for public subnet in AZ-b

  # Application subnets (for Lambda functions)
  AppSubnetACidr:
    Type: String
    Default: "10.0.10.0/24"
    Description: CIDR for application subnet in AZ-a

  AppSubnetBCidr:
    Type: String
    Default: "10.0.11.0/24"
    Description: CIDR for application subnet in AZ-b

  # Data subnets (for OpenSearch Serverless, RDS)
  DataSubnetACidr:
    Type: String
    Default: "10.0.20.0/24"
    Description: CIDR for data subnet in AZ-a

  DataSubnetBCidr:
    Type: String
    Default: "10.0.21.0/24"
    Description: CIDR for data subnet in AZ-b

  ActivateNatGateway:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: |
      Create NAT Gateway for outbound internet access from private subnets.
      REQUIRED for GenAI Accelerator unless you configure VPC Endpoints.
      Note: NAT Gateway costs ~$32/month + data transfer.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment"
        Parameters:
          - EnvironmentName
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCidr
          - ActivateNatGateway
      - Label:
          default: "Subnet CIDRs"
        Parameters:
          - PublicSubnetACidr
          - PublicSubnetBCidr
          - AppSubnetACidr
          - AppSubnetBCidr
          - DataSubnetACidr
          - DataSubnetBCidr

Conditions:
  CreateNatGateway: !Equals [!Ref ActivateNatGateway, "true"]

Resources:
  # ===========================================================================
  # VPC
  # ===========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-vpc"

  # ===========================================================================
  # Internet Gateway (for public subnets)
  # ===========================================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  # ===========================================================================
  # Public Subnets
  # ===========================================================================
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PublicSubnetACidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PublicSubnetBCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-public-b"

  # ===========================================================================
  # Application Subnets (Private - for Lambda functions)
  # ===========================================================================
  AppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref AppSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-app-a"

  AppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref AppSubnetBCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-app-b"

  # ===========================================================================
  # Data Subnets (Private - for OpenSearch Serverless, databases)
  # ===========================================================================
  DataSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref DataSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-data-a"

  DataSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref DataSubnetBCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-data-b"

  # ===========================================================================
  # NAT Gateway (for outbound internet from private subnets)
  # ===========================================================================
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Condition: CreateNatGateway
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateNatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-nat"

  # ===========================================================================
  # Route Tables
  # ===========================================================================
  
  # Public route table (routes to Internet Gateway)
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # Private route table (routes to NAT Gateway if enabled)
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "gaia-${EnvironmentName}-private-rt"

  PrivateRoute:
    Type: AWS::EC2::Route
    Condition: CreateNatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  AppSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppSubnetA
      RouteTableId: !Ref PrivateRouteTable

  AppSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppSubnetB
      RouteTableId: !Ref PrivateRouteTable

  DataSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DataSubnetA
      RouteTableId: !Ref PrivateRouteTable

  DataSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DataSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ===========================================================================
  # SSM Parameters (for easy reference in MDAA configs)
  # ===========================================================================
  VpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/vpc-id"
      Type: String
      Value: !Ref VPC
      Description: "GAIA VPC ID"

  VpcCidrParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/vpc-cidr"
      Type: String
      Value: !Ref VpcCidr
      Description: "GAIA VPC CIDR block"

  AppSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/app-subnet-1"
      Type: String
      Value: !Ref AppSubnetA
      Description: "GAIA application subnet 1"

  AppSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/app-subnet-2"
      Type: String
      Value: !Ref AppSubnetB
      Description: "GAIA application subnet 2"

  DataSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/data-subnet-1"
      Type: String
      Value: !Ref DataSubnetA
      Description: "GAIA data subnet 1"

  DataSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/gaia/data-subnet-2"
      Type: String
      Value: !Ref DataSubnetB
      Description: "GAIA data subnet 2"

  NatGatewayEipParameter:
    Type: AWS::SSM::Parameter
    Condition: CreateNatGateway
    Properties:
      Name: "/gaia/nat-gateway-eip"
      Type: String
      Value: !Ref NatGatewayEIP
      Description: "NAT Gateway public IP (add to WAF allowlist if needed)"

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  VpcCidr:
    Description: VPC CIDR block
    Value: !Ref VpcCidr

  AppSubnetIds:
    Description: Application subnet IDs (comma-separated)
    Value: !Join [",", [!Ref AppSubnetA, !Ref AppSubnetB]]

  DataSubnetIds:
    Description: Data subnet IDs (comma-separated)
    Value: !Join [",", [!Ref DataSubnetA, !Ref DataSubnetB]]

  NatGatewayPublicIp:
    Condition: CreateNatGateway
    Description: NAT Gateway public IP (add to WAF allowlist for Lambda egress)
    Value: !Ref NatGatewayEIP

  SSMParameterPaths:
    Description: SSM parameter paths created by this stack (use in mdaa.yaml context section)
    Value: "/gaia/vpc-id, /gaia/app-subnet-1, /gaia/app-subnet-2, /gaia/data-subnet-1, /gaia/data-subnet-2"
